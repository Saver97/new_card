新渊城历史:
  - 时间: 约500年前
    事件: 深渊裂隙大崩坏
    详情: 异界与现世交界处裂隙爆发，审判庭与恶魔大战，审判庭覆灭，恶魔叛逃者涌入人类世界
    影响: 天使种几近灭绝，恶魔种成为新种族，深渊能量开始渗漏
  
  - 时间: 约480年前
    事件: 圣光审判庭覆灭
    详情: 审判庭在大崩坏中全军覆没，仅余少数女性天使种后裔隐匿
    影响: 天使种成为传说，光系灵能传承断绝
  
  - 时间: 约450年前
    事件: 维克托建立深渊议会
    详情: 恶魔叛逃领袖维克托整合残党，在裂隙边缘建立议会
    影响: 深渊议会成为裂隙区域的实际统治者
  
  - 时间: 约300年前
    事件: 新渊城建城
    详情: 人类在裂隙安全距离外建立城市，利用深渊能量发展科技
    影响: 城市快速崛起，多种族汇聚
  
  - 时间: 约200年前
    事件: 莉莉丝继承初源之血
    详情: 莉莉丝·影纱成为血族嫡系继承者，开始积累势力
    影响: 血族势力隐秘扩张
  
  - 时间: 约100年前
    事件: 三路线技术成熟
    详情: 灵能觉醒、基因强化、义体改造技术逐渐成熟并民用化
    影响: 社会撕裂加剧，三路线对立成为核心矛盾
  
  - 时间: 约50年前
    事件: 城防署成立
    详情: 官方组建城防署维护秩序，管理异能者
    影响: 表面秩序建立，但腐败滋生
  
  - 时间: 约20年前
    事件: 林夜叛逃
    详情: 城防署特工林夜揭露腐败被陷害，接受义体改造后逃亡
    影响: 自由行者联盟成立，佣兵势力崛起
  
  - 时间: 约10年前
    事件: 暮光商会崛起
    详情: 莉莉丝整合黑市交易，建立暮光商会
    影响: 中立商业势力成型，情报网络覆盖全城
  
  - 时间: 现在
    事件: 神之容器计划
    详情: 维克托的终极计划接近完成，城市暗流涌动
    影响: 主角登场，故事开始
