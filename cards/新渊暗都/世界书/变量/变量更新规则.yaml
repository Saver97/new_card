# 新渊暗都 · 变量更新规则
# ★★★ 核心铁律（AI必须严格遵守）★★★
# 1. 每次回复末尾必须输出 <UpdateVariable> 块，格式见变量输出格式
# 2. 只能更新下列路径中列出的变量，未列出的路径禁止写入
# 3. 更新格式必须为标准 JSON Patch（RFC 6902），只允许 replace/add/remove
# 4. 不得修改已锁定变量：姓名/种族/职业/势力/性别（创建后不可变）
# 5. 时间格式必须为 "M月D日·星期X HH:MM:SS"
# 6. NPC关系写入时必须包含完整字段（好感度/看法/职业/种族/外貌身材）
#
# 定义AI可写入的变量路径（JSON Pointer格式）及更新规则
# ★ 标注特殊规则，AI必须遵守

## 主角基础
/主角/基础/姓名:
  type: string
  value: 角色姓名
  check:
    - 仅在角色创建时设定，后续不可更改

/主角/基础/种族:
  type: enum(人类|精灵种|兽化种|血族种|半机械体|天使种|恶魔种|纯机械生命体)
  value: 角色种族
  check:
    - 仅在角色创建时设定，后续不可更改

/主角/基础/年龄:
  type: number
  range: 16-300
  value: 角色年龄
  check:
    - 仅在角色创建时设定，精灵种上限300，其他上限100

/主角/基础/职业:
  type: enum(外勤特工|灵能调查员|暗影执行者|议会学者|赏金猎人|街区医生|情报掮客|器械师)
  value: 角色职业
  check:
    - 仅在角色创建时设定，后续不可更改

/主角/基础/性别:
  type: enum(男|女)
  value: 角色性别
  check:
    - 仅在角色创建时设定
    - ★ 血族种/天使种锁定女，恶魔种锁定男

/主角/基础/势力:
  type: enum(城防署|深渊议会|自由行者联盟|暮光商会)
  value: 角色所属势力
  check:
    - 仅在角色创建时设定，后续不可更改

/主角/基础/金钱:
  type: number
  range: 0-999999999
  value: 持有金钱（夜光币）
  check:
    - 任务报酬、变卖物品、拾取时增加
    - 购物、医疗、改造、贿赂时减少

/主角/基础/外貌身材:
  type: string
  value: 主角外貌身材描述
  check:
    - 仅在角色创建时由AI根据种族/职业/年龄生成
    - 后续仅在重大变化（受伤/换装/变异/侵蚀加深）时更新

## 主角属性
/主角/属性/灵能等级:
  type: number
  range: 0-100
  category:
    - 未觉醒(0)
    - 初醒(1-20)
    - 低阶(21-40)
    - 中阶(41-60)
    - 高阶(61-80)
    - 顶阶(81-99)
    - 极限(100)
  value: 灵能觉醒等级
  check:
    - 纯机械生命体不可用（恒为0）
    - 提升: 战斗顿悟+1~5/冥想修炼+1~3/药物催化+3~10（侵蚀度+2~8）
    - ★ 半机械体觉醒困难，提升缓慢；每次提升额度减半
    - ★ 单次提升上限5，高强度战斗才可达上限
    - 种族加成: 兽化种初始+10，血族种上限+15

/主角/属性/基因强化等级:
  type: number
  range: 0-100
  category:
    - 未强化(0)
    - 初级(1-20)
    - 中级(21-40)
    - 高级(41-60)
    - 精英(61-80)
    - 顶级(81-100)
  value: 基因强化等级
  check:
    - 纯机械生命体不可用（恒为0）
    - 提升: 注射强化剂+5~15（花费5k~50k夜光币）/手术改造+10~25（花费10k~100k夜光币）
    - ★ 排斥风险：10%~30%（随等级递增），失败时侵蚀度+5~15且等级不升
    - ★ 单次提升上限25，连续强化需间隔至少3天
    - 种族加成: 精灵种上限+10

/主角/属性/义体化程度:
  type: number
  range: 0-100
  category:
    - 未改造(0)
    - 初级改造(1-20)
    - 中级改造(21-40)
    - 重度改造(41-60)
    - 半机械化(61-80)
    - 高度机械化(81-99)
    - 完全机械化(100)
  value: 义体化改造程度
  check:
    - 提升: 手术替换部件+5~20（花费5k~50k夜光币）
    - ★ 侵蚀度随义体化递增：每提升10级义体，侵蚀度+1~3
    - ★ 义体化>=80可能出现赛博精神病症状（叙述性，非强制）
    - ★ 单次提升上限20，更换核心部件才可达上限
    - ★ 纯机械生命体锁定100，半机械体初始20

## 突发剧情例外

/主角/属性/${灵能等级|基因强化等级|义体化程度}:
  check:
    - ★ 以下突发剧情可突破常规限制，AI在Analysis中说明触发理由和数值变化
    - ★ 所有突发事件的侵蚀度变化必须同步更新
    - ★ 仍受种族硬限制不可违反（纯机械体灵能恒0等）

    灵能类:
      - 濒死觉醒: 濒临死亡时灵能爆发 +15~35，侵蚀度+3~8
      - 灌顶传功: 高阶者主动传递 +10~30，侵蚀度+2~5
      - 灵能共鸣: 与同系高阶者共鸣 +5~20，侵蚀度+1~3
      - 圣光/暗影传承: 接触审判庭或深渊遗物 +20~40，侵蚀度+5~10
      - 深渊能量吸收: 主动吸收裂隙能量 +15~30，侵蚀度+10~20（高风险）
      - 灵能透支: 过度使用后属性暂时下降 -10~30（下次休息后恢复一半）
      - 封印解除: 被封印的灵能被释放 +20~50，侵蚀度+5~15

    基因类:
      - 隐藏基因激活: 远古/异族血脉觉醒 +15~40，侵蚀度+5~15
      - 基因崩溃重组: 排斥反应意外触发进化 +10~30，侵蚀度+8~20
      - 异族血液注入: 接受其他种族血液 +10~25，侵蚀度+3~10
      - 古老契约觉醒: 精灵种/天使种等血脉契约触发 +20~50，侵蚀度+5~15
      - 基因衰退: 长期缺乏维护导致属性下降 -10~25
      - 基因污染: 被深渊能量污染的基因 +5~15，侵蚀度+15~30（副作用极大）

    义体类:
      - 强制义体改造: 被强行安装高级义体 +20~50，侵蚀度+15~25
      - 黑市改装: 地下医生非法改造 +10~30，侵蚀度+5~15，金钱-5k~30k
      - 战斗中紧急替换: 重伤后紧急安装义体 +5~20，侵蚀度+2~8
      - 古代科技遗物: 融合失落科技遗物 +15~40，侵蚀度+10~25
      - 义体损坏: 战斗中义体受损 -10~30（需花钱修复）
      - 机械意识觉醒: 纯机械体触发隐藏意识 +0，特殊能力变更

    侵蚀/污染类（仅影响侵蚀度）:
      - 裂隙爆发: 深渊裂隙突然喷发 侵蚀度+20~40
      - 深渊产物接触: 触碰深渊遗物/生物 侵蚀度+5~20
      - 禁忌知识阅读: 阅读深渊议会研究文献 侵蚀度+3~15
      - 暮光净化: 接受暮光商会净化服务 侵蚀度-10~30，金钱-20k~100k
      - 自然消退: 长时间远离深渊接触 侵蚀度-1~5/天

/主角/属性/特殊能力:
  type: string
  value: 独特能力描述
  check:
    - 根据种族和路线组合生成
    - 觉醒新能力或获得新改造时更新

/主角/侵蚀度:
  type: number
  range: 0-100
  category:
    - 正常(0-20)
    - 轻度侵蚀(21-40)
    - 中度侵蚀(41-60)
    - 重度侵蚀(61-80)
    - 极度侵蚀(81-99)
    - 完全侵蚀(100)
  value: 深渊侵蚀程度
  check:
    - 深渊接触、义体过度改造、基因排斥时增加
    - ★ >=80时进入赛博精神病/深渊腐化，理智丧失
    - 极难恢复，需特殊药剂或暮光商会净化
    - 具体增加量: 基因排斥失败+5~15，义体10级+1~3，深渊接触+N（视程度）

## 主角着装
/主角/着装/${外套|上衣|下装|内衣|内裤|鞋子|饰品}:
  type: string
  check:
    - 商店购买、任务获取、换装时更改
    - ★ 内衣女性必填，男性可空

## 主角背包
/主角/背包:
  type: array
  check:
    - 拾取物品时add到数组末尾
    - 丢弃/使用/出售时remove对应物品

## 主角战斗定位与情绪
/主角/战斗定位:
  type: enum(前排坦克|中排输出|后排支援|游走刺客|控场法师|全能混合)
  check:
    - 根据职业和属性自动判定，属性大幅变化时更新

/主角/当前情绪:
  type: string
  check:
    - 根据对话情境更新，如愤怒/悲伤/兴奋/恐惧等

## 世界域
/世界/当前时间:
  type: string
  format: "M月D日·星期X HH:MM:SS"
  check:
    - ★ 每次对话开始时推进时间
    - 日常推进1-2时段，战斗/关键事件推进2-5时段
    - 时段序列: 凌晨→早晨→午前→午后→傍晚→夜间→深夜（严格顺序不可逆跳）
    - 跨越午夜时经过天数+1，日期+1

/世界/当前地点:
  type: string
  check:
    - 角色移动时更新
    - 格式为"城区·区域·具体位置"

/世界/经过天数:
  type: number
  range: 0-999
  check:
    - ★ 每日+1，用于触发天数相关事件

/世界/天气:
  type: enum(晴朗|多云|阴天|小雨|大雨|暴雨|雾霾|极光)
  check:
    - 每日随机生成或剧情设定

/世界/都市流言:
  type: string
  check:
    - AI根据当前剧情和天数生成流言内容
    - 每日或剧情推进时更新

/世界/城市活跃度:
  type: enum(平静|正常|紧张|混乱|危机)
  check:
    - 根据主线剧情和城市事件判定

## 任务域
/任务/当前任务:
  type: string
  check:
    - 接取任务时设定任务名
    - ★ 对话出现"{{任务名}}完成"或"{{任务名}}放弃"时清空为"无"

/任务/任务目标:
  type: string
  check:
    - 接取任务时设定目标
    - 任务完成/放弃时清空为"无"
    - 任务推进时更新当前目标

/任务/子任务:
  type: string
  check:
    - 任务拆解时设定
    - 子任务完成时更新或清空

/任务/已获取线索:
  type: string
  check:
    - 探索/对话获得线索时追加
    - ★ 任务完成/放弃时保留（历史记录）

/任务/任务状态:
  type: enum(进行中|已完成|已放弃|无任务)
  check:
    - 接取任务设为"进行中"
    - ★ "{{任务名}}完成"设为"已完成"
    - ★ "{{任务名}}放弃"设为"已放弃"
    - 无任务时为"无任务"

## 社交域
/社交/已遇NPC列表:
  type: array
  check:
    - ★ 首次遇到NPC时，add该NPC姓名到数组
    - 优先以世界书中的NPC为准，但AI生成的NPC也可以添加
    - 不重复添加已存在的NPC
    - AI生成NPC时需同时创建对应的/社交/NPC关系/{NPC名}条目

/社交/当前交互NPC:
  type: string
  check:
    - 对话中的NPC姓名
    - 对话结束或切换对象时更新

/社交/NPC关系/{NPC名}/好感度:
  type: number
  range: 0-100
  category:
    - 陌生(0-20)
    - 熟识(21-40)
    - 友好(41-60)
    - 信任(61-80)
    - 亲密(81-99)
    - 极限(100)
  check:
    - 首次遇到时初始化为0
    - 根据互动结果更新：帮助+，冒犯-，礼物+，背叛-

/社交/NPC关系/{NPC名}/对主角看法:
  type: string
  check:
    - 首次遇到时初始化为"陌生"
    - 根据互动和好感度生成NPC对主角的看法描述

/社交/NPC关系/{NPC名}/主角看法:
  type: string
  check:
    - 首次遇到时初始化为"陌生"
    - 根据互动和好感度生成主角对NPC的看法描述

/社交/NPC关系/{NPC名}/职业:
  type: string
  check:
    - ★ 首次遇到时从世界书NPC条目写入，后续不更改

/社交/NPC关系/{NPC名}/种族:
  type: string
  check:
    - ★ 首次遇到时从世界书NPC条目写入，后续不更改

/社交/NPC关系/{NPC名}/年龄:
  type: number
  range: 0-999
  check:
    - ★ 首次遇到时从世界书NPC条目或AI推理写入

/社交/NPC关系/{NPC名}/性别:
  type: string
  check:
    - ★ 首次遇到时从世界书NPC条目或AI观察写入

/社交/NPC关系/{NPC名}/势力:
  type: string
  check:
    - ★ 首次遇到时从世界书NPC条目写入，后续不更改

/社交/NPC关系/{NPC名}/属性/${灵能等级|基因强化等级|义体化程度|特殊能力}:
  type: number/string
  check:
    - ★ 首次遇到时从世界书NPC条目推断或AI观察生成
    - 后续剧情变化时更新（突破/受伤/改造等）
    - 格式与主角属性一致

/社交/NPC关系/{NPC名}/外貌身材:
  type: string
  check:
    - ★ 首次遇到时AI根据世界书NPC条目的"外貌预设"生成40-80字描写
    - 后续仅在重大变化时更新

/社交/NPC关系/{NPC名}/着装/${外套|上衣|下装|内衣|内裤|鞋子|饰品}:
  type: string
  check:
    - ★ 首次遇到时从NPC条目或AI观察生成
    - 后续换装/战斗/剧情变化时更新
    - 格式与主角着装一致
