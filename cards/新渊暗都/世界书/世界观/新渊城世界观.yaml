核心设定: 新渊城是多种族共存的超级都市，建于古老深渊裂隙之上
  - 城市分三层：上城区（精英/官方）、中城区（商业/平民）、下城区（边缘/地下）
  - 城市边缘是深渊裂隙——异界能量渗漏的源头
  - 表面秩序由城防署维持，暗地多方势力割据

种族分类体系:
  - 人类种：纯血人类，适应性强，三条强化路线皆可
  - 亚人种：人型变异，含精灵种/兽化种/血族种/天使种/恶魔种
  - 机械种：义体改造或机械意识，含半机械体/纯机械生命体

三路线矛盾:
  - 灵能觉醒者自认天赋异禀，看不起改造路线
  - 基因强化者追求完美进化，鄙视机械派
  - 义体改造者崇尚实用主义，认为血肉脆弱
  - 三路线互相敌视，是社会撕裂的核心矛盾

深渊议会的阴谋:
  - 深渊议会试图融合三路线创造「神之容器」
  - 为此不择手段猎杀觉醒者、掠夺改造技术
  - 渗透城防署内部，引发多起骚乱

社会现状:
  - 官方城防署腐败与理想主义并存，内部派系斗争激烈
  - 自由行者联盟靠接悬赏生存，游走各方
  - 暮光商会表面中立，实则在情报与器械交易中渔利
  - 下城区被遗忘，地下黑市与血族势力盘踞
