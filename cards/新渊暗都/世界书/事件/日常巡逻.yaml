日常巡逻事件:
  类型: 随机事件池，巡逻或探索时触发
  适用势力: 全势力
  
事件池:
  - 名称: 街头斗殴
    触发: 中城区/下城区巡逻
    内容: 兽化种帮派与半机械体混混械斗
    选项: [介入制止, 旁观, 加入某方, 报警]
    奖励: 声望/金钱/情报
    
  - 名称: 黑市交易
    触发: 下城区探索
    内容: 发现非法义体交易，卖方可能是暮光商会暗线
    选项: [举报, 勒索, 买入, 忽略]
    奖励: 金钱/义体/情报
    
  - 名称: 觉醒暴走
    触发: 任意城区
    内容: 年轻人灵能觉醒失败暴走，威胁路人
    选项: [制服, 安抚, 击杀, 呼叫支援]
    奖励: 声望/侵蚀度变化/灵能药剂
    
  - 名称: 走私查缉
    触发: 城防署巡逻
    内容: 发现深渊产物走私，嫌疑人指向深渊议会
    选项: [逮捕, 审讯, 放行收贿, 追踪上线]
    奖励: 情报/金钱/腐蚀线索
    
  - 名称: 佣兵冲突
    触发: 自由行者酒吧周边
    内容: 两队佣兵争夺悬赏目标
    选项: [调解, 火中取栗, 接悬赏, 报警]
    奖励: 金钱/悬赏/声望
    
  - 名称: 神秘委托
    触发: 暮光交易所
    内容: 神秘客户高价收购某项情报或器物
    选项: [接单, 拒绝, 调查客户身份, 转手]
    奖励: 金钱/情报/侵蚀线索

事件规则:
  - 每个事件可根据主角势力调整细节
  - 选项后果影响声望、金钱、侵蚀度
  - 部分事件可串联成支线
