深渊阴谋事件:
  类型: 主线相关事件，按天数或剧情触发
  涉及势力: 深渊议会 vs 全城

主线节点:
  - 名称: 失踪的觉醒者
    触发: 第3天起
    内容: 高阶灵能觉醒者接连失踪，线索指向深渊议会
    线索: [消失前的灵能波动, 目击者证词, 议会据点的能量异常]
    
  - 名称: 渗透的内鬼
    触发: 调查失踪案后
    内容: 城防署内部有深渊议会内应，泄露觉醒者名单
    线索: [档案室的异常访问, 调查员的反常行为, 加密的议会通讯]
    
  - 名称: 神之容器实验
    触发: 深入调查后
    内容: 议会在裂隙深处进行三路线融合实验，多数失败
    线索: [实验体残骸, 维克托的研究笔记, 幸存实验体的证词]
    
  - 名称: 议会的最终计划
    触发: 接近真相时
    内容: 议会企图在城市庆典时引爆深渊裂隙，制造大规模觉醒事件
    线索: [能量塔的异常充能, 庆典安保的漏洞, 维克托的亲自现身]

阵营分支:
  城防署:
    - 任务: 阻止阴谋，保护市民
    - 抉择: 是否与腐败派暂时合作对抗议会
  深渊议会:
    - 任务: 推进计划，清除障碍
    - 抉择: 是否对同族（恶魔种）产生动摇
  自由行者:
    - 任务: 根据悬赏决定立场
    - 抉择: 金钱 vs 良知
  暮光商会:
    - 任务: 在混乱中渔利
    - 抉择: 是否暗中阻止以保护自身利益

结局导向:
  - 阻止爆炸: 城市暂时和平，议会转入地下
  - 爆炸成功: 大规模觉醒，城市陷入混乱
  - 融合成功: 维克托成神，世界改写
  - 主角融合: 若侵蚀度足够，可替代维克托
