自由行者联盟:
  领土: 中城区
  总部: 自由行者酒吧
  立场: 零散佣兵，只认钱不认人
  特点: 无势力忠诚，接受任何委托，风险评估与报酬至上

组织结构:
  - 首领: 林夜，退役特工，佣兵之王
  - 核心成员: 资深佣兵，接高难度任务
  - 普通成员: 各类佣兵，自由接单
  - 情报网络: 分布全城的线人

职业分工:
  - 赏金猎人: 追捕、暗杀、护卫
  - 街区医生: 医疗、义体手术、基因注射（廉价但危险）

关键人物:
  - 林夜（首领）: 退役特工，佣兵之王，只认钱不认人

外交关系:
  - 城防署: 亦敌亦友，接官方悬赏也接私活
  - 深渊议会: 敌对，议会视佣兵为工具或障碍
  - 暮光商会: 中立，偶尔合作交易情报

规则:
  - 接单自由，佣金抽成20%
  - 任务失败不追责，但信誉受损
  - 禁止内斗，违者驱逐
  - 情报共享有偿，内部情报网需付费

服务:
  - 临时装备租赁
  - 基础医疗与急救
  - 情报交换（有偿）
  - 住宿与休整

氛围:
  - 烟雾缭绕，重金属音乐
  - 兵匪气息，佣兵自称「自由人」
  - 各势力视角交汇，但只有报酬是共同语言
