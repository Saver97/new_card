中城区:
  位置: 新渊城中层，城市主体
  特点: 商业繁华，人口密集，霓虹灯海
  居民: 普通人类、兽化种、半机械体、各族平民
  建筑: 商业综合体、居民楼、娱乐场所、自由行者据点
  治安: 一般，城防署巡逻但覆盖不足
  灯光: 五彩霓虹，全息广告，喧闹活力

关键地点:
  - 商业区: 各类店铺，义体诊所，基因药剂黑市
  - 居民区: 普通市民住所，社区网络紧密
  - 自由行者酒吧: 联盟总部，悬赏板，佣兵聚集

氛围:
  - 都市生活核心，机遇与危险并存
  - 佣兵接活、情报交易、帮派摩擦的舞台
  - 三路线使用者在此交汇，摩擦频繁

社会分层:
  - 中产阶级聚集地，向上流动与向下坠落并存
  - 自由行者联盟在此扎根，控制佣兵市场
  - 帮派与官方在此拉锯
