暮光商会:
  领土: 上城区
  总部: 暮光交易所
  立场: 中立商人，一切皆可交易
  特点: 表面合法，暗地黑市，情报与器械交易女王

组织结构:
  - 会长: 莉莉丝·影纱，血族商人，情报女王
  - 核心成员: 各交易区主管，血族与人类精英
  - 情报掮客: 情报买卖专家
  - 器械师: 义体与器械技术专家

职业分工:
  - 情报掮客: 情报收集、包装、交易
  - 器械师: 义体改造、器械维修、黑市器械流通

关键人物:
  - 莉莉丝·影纱（会长）: 血族商人，情报与器械交易的幕后女王

外交关系:
  - 城防署: 表面合作，暗地防备
  - 深渊议会: 暗中勾结，深渊产物流入市场
  - 自由行者联盟: 中立，偶尔交易

交易特色:
  - 情报真实但包装华丽
  - 器械经过测试但仍需谨慎
  - 拒绝官方直接购买，可通过中介
  - 默认货币「夜光币」，也接受等价物

规则:
  - 禁止公开斗殴
  - 交易保密，泄露者死
  - 欠账必追，违约必惩

氛围:
  - 永恒夜晚感，灯光暗淡
  - 血族优雅与商人冷酷并存
  - 每笔交易背后都可能沾满鲜血
