城防署总部:
  位置: 上城区核心，巨型玻璃幕墙建筑
  特点: 灵能探测网覆盖，立方体结构，高塔顶层为署长办公室
  功能: 治安管理、异能者管理、高层会议
  空间布局:
    - 地下层: 设备维护、血库、药剂库
    - 1-5层: 普通巡逻队调度、档案室、审讯区
    - 6-10层: 特种部队训练室（灵能响应室）
    - 11-15层: 高层官员办公室、作战会议室
    - 顶层的透明空中大厅: 署长的视野台，俯瞰全城

关键 NPC:
  - 沈星河（署长）: 前灵能特种部队指挥官，理想主义者，与腐败派斗争

氛围:
  - 严肃刻板但暗流涌动，理想与现实的碰撞
  - 灵能响应室里终年回荡着能量波动，调查员常在此预演战斗
  - 档案室藏着不可启封的深渊档案

隐藏内容:
  - 4楼档案室有「城防署-魔鬼条约」旧文件，记载官方与深渊议会的秘密交易
  - 10楼训练室有天使用户遗留的旧装备，被驳回归档
  - 地下层有未被纪录的实验体编号，频繁转移到「未知」地点

听力分级:
  灵能探测: 高灵敏，任何非性能能者靠近都会触发警报
  守卫警惕: 固定巡逻+动态响应，中层区无明显死角
