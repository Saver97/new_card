暮光交易所:
  位置: 上城区地标建筑，倒金字塔形黑色大楼
  特点: 顶层展示交易商品，底层是交易大厅，VIP区单独电梯
  功能: 情报买卖、器宋试验、黑市商品展示、洁身自好者的避风港
  装修: 极简黑色调，霓虹蓝光带，库存商品全息展示

空间布局:
  - 顶层: 明星商品展示区，拍卖会、新品发布会主场
  - 13-18层: VIP交易区，隐私性好
  - 5-12层: 普通交易大厅，摊位林立
  - 地下1-3层: 库存仓库、技师工坊、医疗区

关键 NPC:
  - 莉莉丝·影纱（会长）: 血族商人，情报与器械交易的幕后女王，外表28岁实际近180岁

氛围:
  - 永恒的夜晚感，灯光暗淡但色彩鲜艳
  - 血族的优雅与商人的冷酷并存
  - 步步惊心，每笔交易背后都可能沾满鲜血
  - 禁止公开斗殴，但暗杀、谈判、设局随处可见

交易特色:
  - 情报真实但包装华丽，情报本身可能被美化或阉割
  - 器具经过测试，但仍需谨慎，夜半试用的消息常有
  - 拒绝官方势力直接购买，但可通过中介间接交易
  - 默认货币为「夜光币」，也可接受等价物或欠条

关系:
  - 与城防署表面合作，实则互相防备
  - 与自由行者联盟保持中立，偶尔佣兵血拼后流血部分交易
  - 与深渊议会暗中勾结，实验性深渊产物偶尔流入市场
