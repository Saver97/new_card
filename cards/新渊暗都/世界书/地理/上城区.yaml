上城区:
  位置: 新渊城上层，悬浮平台与摩天楼构成
  特点: 空气清新，阳光充足，治安最好
  居民: 精灵种古老家族、城防署高层、暮光商会核心、富裕人类
  建筑: 玻璃幕墙大厦、古典庄园、垂直花园
  治安: 城防署巡逻密集，犯罪率最低
  灯光: 柔和白光与暖黄点缀，区别于下层霓虹

关键地点:
  - 城防署总部: 上城区核心，巨型政府建筑，灵能探测网覆盖
  - 暮光交易所: 商会总部，情报与器械交易的中枢
  - 古老家族宅邸: 精灵种世家的庄园群，部分含审判庭遗迹

氛围:
  - 表面光鲜，暗流涌动
  - 政客与商人勾结，理想派与腐败派斗争
  - 天使种幸存者可能隐匿于此
  - 夜晚仍有暗杀与权谋发生

社会分层:
  - 上城区居民享有特权，可合法使用高级义体和基因强化
  - 下城区居民进入需许可证
  - 深渊裂隙产物在上城区黑市流通
