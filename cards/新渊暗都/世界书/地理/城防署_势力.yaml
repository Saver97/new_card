城防署:
  领土: 上城区
  总部: 城防署总部
  官方立场: 城市秩序维护者
  内部派系:
    - 理想派: 署长沈星河为首，坚持正义，反对腐败
    - 享乐派: 依赖黑色收入，剥削下层
    - 派系斗争: 公开暗杀、谣言战、派系调动

势力组织:
  - 外勤特工: 对抗罪犯、监控异能者、执行特殊任务
  - 灵能调查员: 专门应对灵能相关情况，使用灵能设备
  - 律政局: 内部审计与纪律调查
  - 退役保存: 退休人员网络，情报来源

关键人物:
  - 沈星河（外勤特工出身）: 前灵能特种部队指挥官，升任署长
  - 秘密调查委员会: 林夜私下情报网络，用于揭露腐败与深渊渗透

外交关系:
  - 天使种: 收容与保护，但内部有杀戮派，怀疑天使种的用途
  - 兽化种: 强制登记注册，严管暴走倾向的兽化种
  - 血族种: 不合作只封锁，禁止血族活动，私下有猎人雇佣
  - 深渊议会: 表面敌对，暗地有争议的「接触协议」
  - 自由行者联盟: 交易关系，部分线人内保
  - 暮光商会: 借用设施，但不买任何黑市交易

特殊能力:
  - 灵能探测塔: 全城覆盖，发现异常灵能波动立即响应
  - 裁决突击: 由善于战斗的调查员组成的小队，响应危机
  - 深渊档案: 收藏长存实体档案，禁止公开读取

黑暗面:
  - 贪污受贿，利用悬赏圈肥私
  - 非法解剖与测试，将异能者视为货币
  - 部分调查员是深渊议会的内应
  - 有「合法」的拷问室，用合规手段输出伤口
