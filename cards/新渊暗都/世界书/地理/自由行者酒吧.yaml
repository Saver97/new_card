自由行者酒吧:
  位置: 中城区核心街区，废弃工厂改造
  特点: 粗犷工业风，霓虹灯斑驳，混凝土地面，全息广告与实地招牌混搭
  功能: 自由行者联盟总部、悬赏板、雇佣兵聚集、情报交换场
  装修:
    - 大厅: 桌台区、全息悬赏板、吧台
    - 二楼: 职务办公室、小房间、楼层专属仓库

空间布局:
  - 一楼大厅: 桌台区，佣兵闲聊，接单人随意筛选
  - 吧台: 露 vår林夜所在位置，可直售生酒，情报交易多发生于此
  - 二楼: 小房间用于私密谈话、任务简报、夜宿
  - 后巷: 摊位、地下诊所入口、黑市接头点

关键 NPC:
  - 林夜（首领）：退役特工，佣兵之王，只认钱不认人，自由行者的实际领袖

氛围:
  - 烟雾缭绕，重金属音乐与低声交谈混合
  - 兵匪气息，佣兵自称「自由人」而非「佣兵」
  - 作为佣兵的中转站，各国视角、各路线仇怨交织
  - 这里没有势力忠诚，只有报酬数额与风险评估

服务:
  - 开放接单，佣金抽成20%
  - 提供临时装备、基础医疗、情报交换
  - 对神秘委托人照单全收，不管是城防署、深渊议会还是各界玩家

关系:
  - 与暮光商会保持中立，偶尔利率冲突
  - 与城防署是亦敌亦友，有时接受官方悬赏，有时私接任务的硬币转走
  - 与深渊议会有分歧，势不两立，偶尔收到匿名酬金任务
