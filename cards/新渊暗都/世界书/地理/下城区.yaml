下城区:
  位置: 新渊城底层，旧城废墟与地下结构
  特点: 阴暗潮湿，阳光罕至，人造光源为主
  居民: 贫困人类、流浪兽化种、血族种、逃亡者
  建筑: 拼凑棚屋、废弃工厂、地下隧道、黑市摊位
  治安: 极差，城防署基本不管，地下规则主导
  灯光: 闪烁霓虹、烛火、生物荧光

关键地点:
  - 贫民窟: 被遗忘者聚集，绝望与求生并存
  - 黑市: 非法义体、禁药、深渊产物交易的温床
  - 地下诊所: 街区医生执业，廉价但危险的改造手术

氛围:
  - 都市阴暗面，绝望与反抗的温床
  - 血族种势力盘踞，夜色中暗藏杀机
  - 深渊裂隙的渗漏偶尔波及，居民侵蚀度偏高

社会分层:
  - 被城市抛弃的底层，官方默许其自治
  - 黑市经济繁荣，暮光商会暗中操控供应链
  - 自由行者在此寻找廉价雇佣兵
