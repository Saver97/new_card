深渊裂隙:
  位置: 新渊城边缘，异界与现世的交界
  特点: 空间扭曲，深渊能量弥漫，常人难以久留
  居民: 深渊议会成员、变异生物、叛逃恶魔
  建筑: 议会据点（改造的裂隙洞穴）、遗迹废墟、能量塔
  治安: 深渊议会绝对控制，外人进入即敌对
  灯光: 暗紫色深渊辉光、能量裂隙的诡异闪烁

关键地点:
  - 深渊议会据点: 议会总部，维克托·深渊的权力中心
  - 裂隙遗迹: 古代审判庭与恶魔战争的遗址，含失落科技
  - 能量塔: 议会建造，用于抽取深渊能量进行人体实验

氛围:
  - 异界的压抑感，深渊低语侵蚀心智
  - 在此处停留侵蚀度持续上升
  - 恶魔种的故乡之一，部分遗迹召唤他们的血脉记忆

社会分层:
  - 深渊议会的独立王国，奉行弱肉强食
  - 议员享受深渊强化，底层是实验材料
  - 城防署将此地列为禁区，但屡次围剿失败

历史:
  - 大崩坏事件: 数百年前裂隙爆发，审判庭覆灭，恶魔叛逃者涌入
  - 议会建立: 叛逃领袖维克托整合残党，建立议会
  - 神之容器计划: 议会的终极目标，融合三路线成神
