深渊议会:
  领土: 深渊裂隙
  总部: 深渊议会据点
  立场: 绝对反派，追求「神之容器」的创造
  目标: 融合灵能/基因/义体三路线，突破人类极限，创造新神

组织结构:
  - 议长: 维克托·深渊，深渊叛逃者领袖，绝对权威
  - 议员: 议会核心，各路线专家，享受深渊强化
  - 暗影执行者: 精锐刺客，执行暗杀与绑架
  - 议会学者: 研究三路线融合，人体实验主导者
  - 底层: 实验材料、失败品、消耗品

关键人物:
  - 维克托·深渊（议长）: 深渊叛逃者领袖，数百年寿命，追求成神

外交关系:
  - 城防署: 表面敌对，暗地渗透，有内应与秘密协议
  - 自由行者联盟: 敌对，议会视佣兵为工具或障碍
  - 暮光商会: 暗中勾结，深渊产物流入黑市
  - 恶魔种: 部分恶魔种是议会后裔，但有叛逃传统

特殊能力:
  - 深渊强化: 议员接受深渊能量改造，战力远超常人
  - 空间裂隙: 可短暂打开小型裂隙，传送或召唤
  - 精神控制: 对侵蚀度高的目标可施加影响
  - 实验体: 创造融合三路线的怪物，多数失控

阴谋:
  - 神之容器计划: 终极目标，创造完美融合体
  - 渗透城防署: 安插内应，操控政策
  - 猎杀觉醒者: 捕捉高阶灵能者作为实验材料
  - 挑起三路线冲突: 加剧社会撕裂，制造混乱

黑暗面:
  - 人体实验，无视道德
  - 失败品直接销毁或投入战场
  - 对成员忠诚度要求极高，叛逃者必杀
  - 深渊能量侵蚀心智，议员多数已非人
