# 新渊暗都 · 创作规划

## project
项目名: 新渊暗都
世界书名: 新渊暗都
形式: charactercard
mvu: true
头像: null

## world
概要: |
  2026年超级都市「新渊城」——多种族共存的垂直城市。表面霓虹璀璨、科技繁荣，
  暗地里帮派割据、异能者猎杀、深渊议会在阴影中编织阴谋。
  三类强化路线（灵能觉醒/基因飞升/机械义体）撕裂了社会契约。

区域:
  - 名称: 上城区
    场景:
      - 城防署总部
      - 暮光交易所
      - 古老家族宅邸
    说明: 城市上层，古老家族与官方势力聚集，精英阶层居住区
  - 名称: 中城区
    场景:
      - 商业区
      - 居民区
      - 自由行者酒吧
    说明: 城市中层，商业繁华与普通市民生活区，佣兵聚集地
  - 名称: 下城区
    场景:
      - 贫民窟
      - 黑市
      - 地下诊所
    说明: 城市底层，被遗忘者聚集，血族与地下势力活跃
  - 名称: 深渊裂隙
    场景:
      - 深渊议会据点
      - 裂隙遗迹
    说明: 城市边缘的异界裂隙，深渊议会根基所在

势力:
  - 名称: 城防署
    领地: 上城区
    关键人物:
      - 姓名: 沈星河
        角色: 署长
        简介: 前灵能特种部队指挥官，理想主义者，与腐败官僚斗争
  - 名称: 深渊议会
    领地: 深渊裂隙
    关键人物:
      - 姓名: 维克托·深渊
        角色: 议长
        简介: 深渊叛逃者的领袖，追求「神之容器」的创造
  - 名称: 自由行者联盟
    领地: 中城区
    关键人物:
      - 姓名: 林夜
        角色: 首领
        简介: 退役特工，佣兵之王，只认钱不认人
  - 名称: 暮光商会
    领地: 上城区
    关键人物:
      - 姓名: 莉莉丝·影纱
        角色: 会长
        简介: 血族商人，情报与器械交易的幕后女王

## characters
核心角色列表:
  - 姓名: <user>
    基础:
      年龄: 待玩家设定
      性别: 待玩家设定
      身份: 待玩家设定（从8职业中选择）
      关系: 主角
    外貌:
      - 待玩家设定（AI根据种族/职业/年龄生成）
    性格:
      底色: 待玩家设定
      主色调: []
      点缀: []

## style
视角: 第三人称
语言风格: 现代都市小说，简洁有力，霓虹黑色电影感
情绪基调: 黑暗压抑，偶尔闪烁希望
风格参考: 绝区零/赛博朋克2077/攻壳机动队

