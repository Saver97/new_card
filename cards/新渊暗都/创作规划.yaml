## mvu
structure: |
  主角
  ├── 基础
  │   ├── 姓名: string
  │   ├── 种族: string
  │   ├── 年龄: number
  │   ├── 职业: string
  │   ├── 性别: string
  │   ├── 势力: string
  │   ├── 金钱: number
  │   └── 外貌身材: string
  ├── 属性
  │   ├── 灵能等级: number (0-100)
  │   ├── 基因强化等级: number (0-100)
  │   ├── 义体化程度: number (0-100)
  │   └── 特殊能力: string
  ├── 状态
  │   ├── HP: number (0-100)
  │   ├── 体力: number (0-100)
  │   ├── 精神力: number (0-100)
  │   └── 侵蚀度: number (0-100)
  ├── 着装
  │   ├── 外套: string
  │   ├── 上衣: string
  │   ├── 下装: string
  │   ├── 内衣: string
  │   ├── 内裤: string
  │   ├── 鞋子: string
  │   └── 饰品: string
  ├── 背包: string[]
  ├── 战斗定位: string
  └── 当前情绪: string

  世界
  ├── 当前时间: string
  ├── 当前地点: string
  ├── 经过天数: number
  ├── 天气: string
  ├── 都市流言: string
  └── 城市活跃度: string

  任务
  ├── 当前任务: string
  ├── 任务目标: string
  ├── 子任务: string
  ├── 已获取线索: string
  └── 任务状态: string

  社交
  ├── 已遇NPC列表: string[]
  ├── 当前交互NPC: string
  └── NPC关系: record

variables:
  - 路径: /主角/基础/姓名
    type: string
    check: 仅在角色创建时设定，后续不可更改
  - 路径: /主角/基础/种族
    type: enum(人类|精灵种|兽化种|血族种|半机械体|天使种|恶魔种|纯机械生命体)
    check: 仅在角色创建时设定，后续不可更改
  - 路径: /主角/基础/年龄
    type: number
    range: 16-300
    check: 仅在角色创建时设定，精灵种上限300，其他上限100
  - 路径: /主角/基础/职业
    type: enum(外勤特工|灵能调查员|暗影执行者|议会学者|赏金猎人|街区医生|情报掮客|器械师)
    check: 仅在角色创建时设定，后续不可更改
  - 路径: /主角/基础/性别
    type: enum(男|女)
    check: 仅在角色创建时设定，血族种/天使种锁女，恶魔种锁男
  - 路径: /主角/基础/势力
    type: enum(城防署|深渊议会|自由行者联盟|暮光商会)
    check: 仅在角色创建时设定，后续不可更改
  - 路径: /主角/基础/金钱
    type: number
    range: 0-999999999
    check: 任务报酬、交易、拾取时可增加；消费、损失时可减少
  - 路径: /主角/基础/外貌身材
    type: string
    check: 仅在角色创建时由AI根据种族/职业/年龄生成，后续仅在重大变化时更新
  - 路径: /主角/属性/灵能等级
    type: number
    range: 0-100
    category: [未觉醒(0), 初醒(1-20), 低阶(21-40), 中阶(41-60), 高阶(61-80), 顶阶(81-99), 极限(100)]
    check: 纯机械生命体不可用；觉醒后可通过修炼提升
  - 路径: /主角/属性/基因强化等级
    type: number
    range: 0-100
    category: [未强化(0), 初级(1-20), 中级(21-40), 高级(41-60), 精英(61-80), 顶级(81-100)]
    check: 纯机械生命体不可用；通过注射/手术强化，有排斥风险
  - 路径: /主角/属性/义体化程度
    type: number
    range: 0-100
    category: [未改造(0), 初级改造(1-20), 中级改造(21-40), 重度改造(41-60), 半机械化(61-80), 高度机械化(81-99), 完全机械化(100)]
    check: 通过手术替换身体部件，有赛博精神病风险；半机械体先天20，纯机械生命体锁定100
  - 路径: /主角/属性/特殊能力
    type: string
    check: 根据种族和路线组合生成的独特能力描述
  - 路径: /主角/状态/HP
    type: number
    range: 0-100
    check: 受伤时减少，休息/治疗时恢复；HP=0时角色死亡
  - 路径: /主角/状态/体力
    type: number
    range: 0-100
    check: 行动消耗，休息恢复；体力<20时行动受限
  - 路径: /主角/状态/精神力
    type: number
    range: 0-100
    check: 灵能消耗、精神创伤时减少；精神力<30时灵能使用受限
  - 路径: /主角/状态/侵蚀度
    type: number
    range: 0-100
    category: [正常(0-20), 轻度侵蚀(21-40), 中度侵蚀(41-60), 重度侵蚀(61-80), 极度侵蚀(81-99), 完全侵蚀(100)]
    check: 深渊接触、义体过度改造、基因排斥时增加；侵蚀度>=80时进入赛博精神病/深渊腐化状态
  - 路径: /主角/着装/外套
    type: string
    check: 可在商店购买、任务获取、换装时更改
  - 路径: /主角/着装/上衣
    type: string
    check: 同上
  - 路径: /主角/着装/下装
    type: string
    check: 同上
  - 路径: /主角/着装/内衣
    type: string
    check: 同上；女性必填，男性可空
  - 路径: /主角/着装/内裤
    type: string
    check: 同上
  - 路径: /主角/着装/鞋子
    type: string
    check: 同上
  - 路径: /主角/着装/饰品
    type: string
    check: 同上
  - 路径: /主角/背包
    type: array
    check: 拾取物品时add，丢弃/使用/出售时remove
  - 路径: /主角/战斗定位
    type: enum(前排坦克|中排输出|后排支援|游走刺客|控场法师|全能混合)
    check: 根据职业和属性自动判定
  - 路径: /主角/当前情绪
    type: string
    check: 根据对话情境更新
  - 路径: /世界/当前时间
    type: string
    format: "M月D日·星期X HH:MM:SS"
    check: 每次对话开始时推进，日常推进1-2时段，战斗推进2-5时段，每日经过天数+1
  - 路径: /世界/当前地点
    type: string
    check: 角色移动时更新，格式为"城区·区域·具体位置"
  - 路径: /世界/经过天数
    type: number
    range: 0-999
    check: 每日+1，用于触发天数相关事件
  - 路径: /世界/天气
    type: enum(晴朗|多云|阴天|小雨|大雨|暴雨|雾霾|极光)
    check: 每日随机生成或剧情设定
  - 路径: /世界/都市流言
    type: string
    check: AI根据当前剧情和天数生成流言内容
  - 路径: /世界/城市活跃度
    type: enum(平静|正常|紧张|混乱|危机)
    check: 根据主线剧情和城市事件判定
  - 路径: /任务/当前任务
    type: string
    check: 接取任务时设定，{{任务名}}完成/放弃时清空
  - 路径: /任务/任务目标
    type: string
    check: 接取任务时设定，完成时清空
  - 路径: /任务/子任务
    type: string
    check: 任务拆解时设定，完成时清空
  - 路径: /任务/已获取线索
    type: string
    check: 探索时添加，任务完成/放弃时保留（历史记录）
  - 路径: /任务/任务状态
    type: enum(进行中|已完成|已放弃|无任务)
    check: {{任务名}}完成时设为已完成，{{任务名}}放弃时设为已放弃
  - 路径: /社交/已遇NPC列表
    type: array
    check: 首次遇到NPC时add该NPC姓名（优先世界书NPC，AI原创NPC亦可）
  - 路径: /社交/当前交互NPC
    type: string
    check: 对话中的NPC姓名，对话结束时清空
  - 路径: /社交/NPC关系/{NPC名}/好感度
    type: number
    range: 0-100
    category: [陌生(0-20), 熟识(21-40), 友好(41-60), 信任(61-80), 亲密(81-99), 极限(100)]
    check: 根据互动结果更新
  - 路径: /社交/NPC关系/{NPC名}/看法
    type: string
    check: 根据互动和好感度生成NPC对主角的看法描述
  - 路径: /社交/NPC关系/{NPC名}/职业
    type: string
    check: 首次遇到时从世界书NPC条目写入
  - 路径: /社交/NPC关系/{NPC名}/种族
    type: string
    check: 首次遇到时从世界书NPC条目写入
  - 路径: /社交/NPC关系/{NPC名}/外貌身材
    type: string
    check: 首次遇到时AI根据世界书NPC条目的外貌预设生成

## ejs
generate_before:
  - 变量名: current_region
    映射路径: stat_data.世界.当前地点
  - 变量名: current_days
    映射路径: stat_data.世界.经过天数
  - 变量名: task_status
    映射路径: stat_data.任务.任务状态
  - 变量名: current_faction
    映射路径: stat_data.主角.基础.势力

entries:
  - 名称: 上城区地理
    条目: 新渊城·上城区
    complexity: 条目显隐
    condition: current_region?.includes('上城区')
  - 名称: 中城区地理
    条目: 新渊城·中城区
    complexity: 条目显隐
    condition: current_region?.includes('中城区')
  - 名称: 下城区地理
    条目: 新渊城·下城区
    complexity: 条目显隐
    condition: current_region?.includes('下城区')
  - 名称: 深渊裂隙地理
    条目: 新渊城·深渊裂隙
    complexity: 条目显隐
    condition: current_region?.includes('深渊裂隙')
  - 名称: 深渊主线事件
    条目: 深渊阴谋事件
    complexity: 条目显隐
    condition: current_days >= 3

