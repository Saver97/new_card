<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新渊暗都 · 角色创建</title>
<style>
:root{
  --bg:#080b14;--card:#0f1322;--border:#1e2d50;
  --text:#c8d6e5;--muted:#5a6988;--gold:#f0c040;
  --blue:#4fc3f7;--purple:#ab47bc;--green:#66bb6a;
  --orange:#ffa726;--pink:#ec407a;--red:#ef5350;
  --cyan:#00e5ff;--neon:#39ff14;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:16px;font-size:14px;background-image:radial-gradient(ellipse at top,rgba(79,195,247,.06) 0%,transparent 60%),radial-gradient(ellipse at bottom right,rgba(171,71,188,.04) 0%,transparent 50%)}
.container{max-width:820px;width:100%}

/* Header */
.panel-header{text-align:center;margin-bottom:20px}
.panel-header .logo{font-size:28px;font-weight:800;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 20px rgba(0,229,255,.3)}
.panel-header .tagline{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:2px}

/* Step indicator */
.steps{display:flex;justify-content:center;gap:0;margin-bottom:24px;background:var(--card);border-radius:30px;padding:4px;border:1px solid var(--border)}
.step{flex:1;padding:10px 12px;text-align:center;font-size:11px;color:var(--muted);border-radius:26px;cursor:default;transition:all .3s;position:relative;white-space:nowrap}
.step.active{background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(79,195,247,.08));color:var(--cyan);font-weight:600;box-shadow:inset 0 0 12px rgba(0,229,255,.08)}
.step.done{color:var(--green)}
.step .step-num{display:block;font-size:10px;opacity:.6;margin-bottom:2px}

/* Panel */
.step-panel{display:none;animation:fadeIn .25s ease}
.step-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.card-header{margin-bottom:18px}
.card-header h2{font-size:17px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.card-header .icon{font-size:22px}
.card-header p{font-size:12px;color:var(--muted);margin-top:4px}

/* Options grid */
.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.option-card{background:rgba(255,255,255,.02);border:2px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center}
.option-card:hover{border-color:var(--cyan);background:rgba(0,229,255,.04);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.option-card.selected{border-color:var(--cyan);background:rgba(0,229,255,.08);box-shadow:0 0 20px rgba(0,229,255,.1)}
.option-card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;filter:grayscale(.5)}
.option-card .opt-icon{font-size:30px;margin-bottom:8px;line-height:1}
.option-card .opt-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.option-card .opt-desc{font-size:11px;color:var(--muted);line-height:1.5}
.option-card .opt-badge{position:absolute;top:8px;right:8px;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.option-card.gender-card{padding:20px 16px}
.option-card.gender-card .opt-icon{font-size:40px;margin-bottom:0}
.badge-legend{background:rgba(255,107,0,.2);color:#ff8c42;border:1px solid rgba(255,107,0,.3)}
.badge-special{background:rgba(171,71,188,.2);color:#ce93d8;border:1px solid rgba(171,71,188,.3)}
.badge-faction{position:absolute;bottom:10px;right:10px;font-size:9px;color:var(--muted);opacity:.5}

/* Info bar */
.info-bar{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:12px;color:var(--cyan);display:none;animation:fadeIn .3s ease}
.warning-bar{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.2);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:12px;color:#ff8c42;display:none;animation:fadeIn .3s ease}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:0}
.form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.form-group input{width:100%;padding:14px 16px;border-radius:10px;border:2px solid var(--border);background:rgba(0,0,0,.2);color:var(--text);font-size:15px;transition:all .2s}
.form-group input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.08)}
.form-group input::placeholder{color:var(--muted)}

/* Preview */
.preview{background:rgba(0,0,0,.2);border:2px solid var(--cyan);border-radius:12px;padding:24px;margin-bottom:0}
.preview h3{font-size:14px;color:var(--cyan);margin-bottom:16px;text-transform:uppercase;letter-spacing:2px}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preview-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.02);border-radius:6px;font-size:13px}
.preview-label{color:var(--muted)}
.preview-value{color:var(--text);font-weight:500}
.preview-value.gold{color:var(--gold)}

/* Buttons */
.btn-group{display:flex;gap:12px;margin-top:18px;justify-content:center}
.btn{padding:12px 28px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .25s;letter-spacing:.5px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000;box-shadow:0 4px 16px rgba(0,229,255,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,229,255,.3)}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-create{background:linear-gradient(135deg,var(--neon),var(--cyan));color:#000;font-weight:700;width:100%;font-size:15px;padding:14px;box-shadow:0 4px 20px rgba(57,255,20,.2);letter-spacing:1px}
.btn-create:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(57,255,20,.3)}
.btn-create:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:grayscale(.3)}

/* Card text */
.card-header h2{font-size:16px}
.card-header p{font-size:11px;line-height:1.5}
.form-group label{font-size:11px;margin-bottom:5px}
</style>
</head>

<div class="step-panel active" id="step1">

</div>

<div class="step-panel" id="step2">

<div class="options-grid" id="job-options"></div>

</div>
<div class="btn-group"><button class="btn btn-secondary" onclick="prevStep(2)">← 上一步</button><button class="btn btn-primary" onclick="nextStep(2)">下一步 →</button></div>
</div>

<div class="step-panel" id="step3">
<div class="card">

<div class="warning-bar" id="race-warning"></div>
<div class="info-bar" id="race-info"></div>
</div>
<div class="btn-group"><button class="btn btn-secondary" onclick="prevStep(3)">← 上一步</button><button class="btn btn-primary" onclick="nextStep(3)">下一步 →</button></div>
</div>

<div class="step-panel" id="step4">
<div class="card">
<div class="card-header"><h2><span class="icon">👤</span>选择你的性别</h2><p>部分种族有性别限制</p></div>
<div class="options-grid" id="gender-options"></div>
<div class="warning-bar" id="gender-warning"></div>
</div>
<div class="btn-group"><button class="btn btn-secondary" onclick="prevStep(4)">← 上一步</button><button class="btn btn-primary" onclick="nextStep(4)">下一步 →</button></div>
</div>

<div class="step-panel" id="step5">
<div class="card">

<div class="form-row">
<div class="form-group"><label>角色姓名</label><input type="text" id="char-name" placeholder="输入角色姓名" maxlength="20"></div>
<div class="form-group"><label>年龄 (16-300)</label><input type="number" id="char-age" min="16" max="300" value="25"></div>
</div>
</div>
<div class="btn-group"><button class="btn btn-secondary" onclick="prevStep(5)">← 上一步</button><button class="btn btn-primary" onclick="nextStep(5)">下一步 →</button></div>
</div>

<div class="step-panel" id="step6">
<div class="card">
<div class="card-header"><h2><span class="icon">✅</span>确认角色信息</h2><p>检查无误后点击确认创建</p></div>
<div class="preview" id="char-preview"></div>
</div>
<div class="btn-group"><button class="btn btn-secondary" onclick="prevStep(6)">← 上一步</button><button class="btn btn-create" onclick="createCharacter()">确认创建角色</button></div>
</div>
</div>

var RACES={'人类':{rarity:'普通',lockGender:null,blockFactions:[],desc:'适应性极强，三条强化路线均无先天偏向',icon:'👤'},'精灵种':{rarity:'普通',lockGender:null,blockFactions:[],desc:'远古自然契约后裔，寿命300+，基因强化上限+10',icon:'🌿'},'兽化种':{rarity:'普通',lockGender:null,blockFactions:[],desc:'兽灵血统觉醒，感官敏锐，灵能初始+10',icon:'🐾'},'血族种':{rarity:'特殊',lockGender:'女',blockFactions:['城防署'],desc:'初源之血的女性血脉，白日减半·黑夜翻倍',icon:'🩸'},'半机械体':{rarity:'特殊',lockGender:null,blockFactions:['深渊议会'],desc:'先天义体化20%，义体上限+15',icon:'⚙️'},'天使种':{rarity:'传说',lockGender:'女',blockFactions:['深渊议会','暮光商会'],desc:'圣光审判庭幸存遗民，光系灵能锁定',icon:'🪽'},'恶魔种':{rarity:'传说',lockGender:'男',blockFactions:['城防署'],desc:'深渊裂隙叛逃者后裔，暗系灵能·地狱火',icon:'🔥'},'纯机械生命体':{rarity:'传说',lockGender:null,blockFactions:['深渊议会'],desc:'失落科技觉醒AI，无灵能无基因·义体满级',icon:'🔷'}};

function renderRaceOptions(){var c=document.getElementById('race-options');c.innerHTML='';Object.keys(RACES).forEach(function(n){var r=RACES[n];var blocked=r.blockFactions.indexOf(selectedFaction)>=0;var b=document.createElement('div');b.className='option-card'+(blocked?' disabled':'');var tag='';if(r.rarity==='传说')tag='<span class="opt-badge badge-legend">传说</span>';else if(r.rarity==='特殊')tag='<span class="opt-badge badge-special">特殊</span>';b.innerHTML=tag+'<div class="opt-icon">'+r.icon+'</div><div class="opt-name">'+n+'</div><div class="opt-desc">'+r.desc+'</div>';if(!blocked)b.onclick=function(){selectRace(n,this)};c.appendChild(b)})}

function selectFaction(n,el){selectedFaction=n;document.querySelectorAll('#faction-options .option-card').forEach(function(b){b.classList.remove('selected')});el.classList.add('selected');document.getElementById('faction-info').textContent='📌 '+FACTIONS[n].desc;document.getElementById('faction-info').style.display='block'}
function selectJob(n,el){selectedJob=n;document.querySelectorAll('#job-options .option-card').forEach(function(b){b.classList.remove('selected')});el.classList.add('selected');document.getElementById('job-info').textContent='📌 '+JOBS[n].desc;document.getElementById('job-info').style.display='block'}
