<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新渊暗都 · 信息面板</title>
<style>
:root{--bg:#0f1119;--card:#161b2a;--border:#1e2d50;--text:#c8d6e5;--muted:#6a7d99;--gold:#f0c040;--blue:#4fc3f7;--purple:#ab47bc;--green:#66bb6a;--orange:#ffa726;--pink:#ec407a;--danger:#ef5350}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a0b14;color:var(--text);min-height:var(--TH-viewport-height);display:flex;justify-content:center;padding:12px;font-size:14px}
.container{max-width:720px;width:100%}
.header{text-align:center;margin-bottom:12px}
.header h1{font-size:18px;color:var(--blue);margin-bottom:4px}
.header p{font-size:11px;color:var(--muted)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;overflow:hidden}
.tab-btn{flex:1;padding:12px 8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(79,195,247,.08)}
.tab-panel{display:none;padding:12px;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:520px;overflow-y:auto}
.tab-panel.active{display:block}
.card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.card h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.form-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.04);font-size:13px}
.form-row:last-child{border-bottom:none}
.form-row label{color:var(--muted)}
.form-row .val{color:var(--text);font-weight:500}
.kv-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.04);font-size:13px;gap:12px}
.kv-row:last-child{border-bottom:none}
.kv-v{color:var(--text);text-align:right;flex:1}
.bar-wrap{margin-bottom:10px}
.bar-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--muted)}
.bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.npc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.npc-g-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:2px}
.npc-g-label{font-size:11px;color:var(--muted)}
.npc-g-val{font-size:13px;font-weight:600;color:var(--text)}
.nodata{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.npc-card-w{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.npc-head{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.npc-name{font-size:14px;font-weight:600;color:var(--text)}
.npc-badge{font-size:11px;color:var(--muted);margin-left:8px;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px}
.npc-body{display:none;padding:0 12px 12px}
.npc-body.open{display:block}
.ns-title{font-size:11px;color:var(--pink);font-weight:700;margin:10px 0 6px;text-transform:uppercase}
.text-block{background:rgba(0,0,0,.15);border-radius:6px;padding:8px;margin-bottom:8px}
.footer{text-align:center;font-size:11px;color:var(--muted);padding:8px;margin-top:8px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>新渊暗都 状态面板</h1><p>只读显示</p></div>
<div class="tabs">
<button class="tab-btn active" data-tab="world">世界</button>
<button class="tab-btn" data-tab="hero">主角</button>
<button class="tab-btn" data-tab="task">任务</button>
<button class="tab-btn" data-tab="npc">社交</button>
</div>
<div class="tab-panel active" id="tab-world">
<div class="card"><h3><span class="dot" style="background:var(--blue)"></span>时空</h3>
<div class="form-row"><label>时间</label><span class="val" id="w-time">-</span></div>
<div class="form-row"><label>地点</label><span class="val" id="w-loc">-</span></div>
<div class="form-row"><label>天数</label><span class="val" id="w-days">-</span></div>
<div class="form-row"><label>天气</label><span class="val" id="w-weather">-</span></div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--gold)"></span>动态</h3>
<div class="form-row"><label>活跃度</label><span class="val" id="w-activity">-</span></div>
<div class="kv-row"><span style="color:var(--muted)">流言</span><span class="kv-v" id="w-rumor">-</span></div>
</div>
</div>
<div class="tab-panel" id="tab-hero">
<div class="card"><h3><span class="dot" style="background:var(--gold)"></span>身份</h3>
<div class="form-row"><label>姓名</label><span class="val" id="h-name">-</span></div>
<div class="form-row"><label>势力</label><span class="val" id="h-faction">-</span></div>
<div class="form-row"><label>职业</label><span class="val" id="h-job">-</span></div>
<div class="form-row"><label>种族</label><span class="val" id="h-race">-</span></div>
<div class="form-row"><label>性别</label><span class="val" id="h-gender">-</span></div>
<div class="form-row"><label>年龄</label><span class="val" id="h-age">-</span></div>
<div class="form-row"><label>金钱</label><span class="val" id="h-money" style="color:var(--gold)">-</span></div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--purple)"></span>外貌</h3>
<div class="text-block"><span id="h-appearance">-</span></div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--blue)"></span>属性</h3>
<div class="npc-grid">
<div class="npc-g-card"><span class="npc-g-label">灵能</span><span class="npc-g-val" id="h-psionic">0</span></div>
<div class="npc-g-card"><span class="npc-g-label">基因</span><span class="npc-g-val" id="h-gene">0</span></div>
<div class="npc-g-card"><span class="npc-g-label">义体</span><span class="npc-g-val" id="h-cyber">0</span></div>
<div class="npc-g-card"><span class="npc-g-label">特殊</span><span class="npc-g-val" id="h-special">-</span></div>
</div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--danger)"></span>状态</h3>
<div class="bar-wrap"><div class="bar-info"><span>HP</span><span id="h-hp-txt">0/100</span></div><div class="bar-bg"><div class="bar-fill" id="h-hp-bar" style="width:0%;background:var(--danger)"></div></div></div>
<div class="bar-wrap"><div class="bar-info"><span>体力</span><span id="h-stamina-txt">0/100</span></div><div class="bar-bg"><div class="bar-fill" id="h-stamina-bar" style="width:0%;background:var(--green)"></div></div></div>
<div class="bar-wrap"><div class="bar-info"><span>精神</span><span id="h-mental-txt">0/100</span></div><div class="bar-bg"><div class="bar-fill" id="h-mental-bar" style="width:0%;background:var(--blue)"></div></div></div>
<div class="bar-wrap"><div class="bar-info"><span>侵蚀</span><span id="h-erosion-txt">0/100</span></div><div class="bar-bg"><div class="bar-fill" id="h-erosion-bar" style="width:0%;background:var(--purple)"></div></div></div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--green)"></span>着装</h3>
<div class="npc-grid">
<div class="npc-g-card"><span class="npc-g-label">外套</span><span class="npc-g-val" id="h-gear-coat">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">上衣</span><span class="npc-g-val" id="h-gear-top">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">下装</span><span class="npc-g-val" id="h-gear-bottom">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">内衣</span><span class="npc-g-val" id="h-gear-under">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">内裤</span><span class="npc-g-val" id="h-gear-pants">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">鞋子</span><span class="npc-g-val" id="h-gear-shoes">空置</span></div>
<div class="npc-g-card"><span class="npc-g-label">饰品</span><span class="npc-g-val" id="h-gear-acc">空置</span></div>
</div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--gold)"></span>背包</h3>
<div id="hero-inventory"></div>
</div>
</div>
<div class="tab-panel" id="tab-task">
<div class="card"><h3><span class="dot" style="background:var(--orange)"></span>任务</h3>
<div class="form-row"><label>当前</label><span class="val" id="t-main">-</span></div>
<div class="form-row"><label>目标</label><span class="val" id="t-objective">-</span></div>
<div class="form-row"><label>子任务</label><span class="val" id="t-sub">-</span></div>
<div class="form-row"><label>状态</label><span class="val" id="t-status">-</span></div>
</div>
<div class="card"><h3><span class="dot" style="background:var(--pink)"></span>线索</h3>
<div class="text-block"><span id="t-clues">-</span></div>
</div>
</div>
<div class="tab-panel" id="tab-npc">
<div class="card" style="margin-bottom:8px"><h3><span class="dot" style="background:var(--pink)"></span>社交</h3></div>
<div id="npc-container"></div>
</div>
<div class="footer">新渊暗都 RPG</div>
</div>
<script>
function getProp(obj,path,def){var keys=path.split('.');var r=obj;for(var i=0;i<keys.length;i++){if(r&&typeof r==='object'&&keys[i]in r)r=r[keys[i]];else return def}return r!==undefined?r:def}
function escapeHtml(str){if(!str)return '';var result='';for(var i=0;i<str.length;i++){var code=str.charCodeAt(i);if(code===38)result+='&amp;';else if(code===60)result+='&lt;';else if(code===62)result+='&gt;'; if(code===34)result+='&quot;';else if(code===39)result+='&#39;';else result+=str[i]}return result}
window.cachedData=null;
function renderNPCs(data){var nc=document.getElementById('npc-container');var npcList=data?getProp(data,'社交.已遇NPC列表',[]):[];var npcRels=data?getProp(data,'社交.NPC关系',{}):{};if(!npcList||npcList.length===0){nc.innerHTML='<div class="nodata">尚未遇到NPC</div>';return}var html='';npcList.forEach(function(nName){var npc=npcRels[nName]||{};var aff=npc.好感度||0;var job=npc.职业||'-';var race=npc.种族||'-';var look=npc.外貌身材||'待生成';var view=npc.看法||'陌生';html+='<div class="npc-card-w"><div class="npc-head" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><div class="npc-name">'+escapeHtml(nName)+'<span class="npc-badge">'+race+' '+escapeHtml(job)+'</span><span class="npc-badge" style="color:var(--pink)">好感'+aff+'</span></div></div><div class="npc-body"><div class="ns-title">外貌</div><div class="text-block"><span>'+escapeHtml(look)+'</span></div><div class="ns-title">看法</div><div class="text-block"><span style="color:var(--gold)">'+escapeHtml(view)+'</span></div><div style="margin-top:8px"><div class="bar-info"><span>好感</span><span style="color:var(--pink)">'+aff+'/100</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+aff+'%;background:var(--pink)"></div></div></div></div></div>'});nc.innerHTML=html}
function renderAll(){try{var sd=null;if(typeof getAllVariables==='function'){var all=getAllVariables();var parsed=typeof _!=='undefined'?_.get(all,'stat_data'):(all.stat_data||all);if(parsed&&Object.keys(parsed).length>0)sd=parsed}window.cachedData=sd;if(!sd){renderNPCs(null);return}document.getElementById('w-time').textContent=getProp(sd,'世界.当前时间','-');document.getElementById('w-loc').textContent=getProp(sd,'世界.当前地点','-');document.getElementById('w-days').textContent='第'+(parseInt(getProp(sd,'世界.经过天数',0))||0)+'天';document.getElementById('w-weather').textContent=getProp(sd,'世界.天气','-');document.getElementById('w-activity').textContent=getProp(sd,'世界.城市活跃度','-');document.getElementById('w-rumor').textContent=getProp(sd,'世界.都市流言','')||'-';var basic=getProp(sd,'主角.基础',{});document.getElementById('h-name').textContent=basic.姓名||'-';document.getElementById('h-faction').textContent=basic.势力||'-';document.getElementById('h-job').textContent=basic.职业||'-';document.getElementById('h-race').textContent=basic.种族||'-';document.getElementById('h-gender').textContent=basic.性别||'-';document.getElementById('h-age').textContent=(basic.年龄||'-')+'岁';document.getElementById('h-money').textContent=(basic.金钱||0)+' 夜光币';document.getElementById('h-appearance').textContent=basic.外貌身材||'待生成';var attr=getProp(sd,'主角.属性',{});document.getElementById('h-psionic').textContent=attr.灵能等级||0;document.getElementById('h-gene').textContent=attr.基因强化等级||0;document.getElementById('h-cyber').textContent=attr.义体化程度||0;document.getElementById('h-special').textContent=attr.特殊能力||'无';var st=getProp(sd,'主角.状态',{});var hp=st.HP||100;var stamina=st.体力||100;var mental=st.精神力||100;var erosion=st.侵蚀度||0;document.getElementById('h-hp-txt').textContent=hp+'/100';document.getElementById('h-hp-bar').style.width=hp+'%';document.getElementById('h-stamina-txt').textContent=stamina+'/100';document.getElementById('h-stamina-bar').style.width=stamina+'%';document.getElementById('h-mental-txt').textContent=mental+'/100';document.getElementById('h-mental-bar').style.width=mental+'%';document.getElementById('h-erosion-txt').textContent=erosion+'/100';document.getElementById('h-erosion-bar').style.width=erosion+'%';var outfit=getProp(sd,'主角.着装',{});document.getElementById('h-gear-coat').textContent=getProp(outfit,'外套','空置');document.getElementById('h-gear-top').textContent=getProp(outfit,'上衣','空置');document.getElementById('h-gear-bottom').textContent=getProp(outfit,'下装','空置');document.getElementById('h-gear-under').textContent=getProp(outfit,'内衣','空置');document.getElementById('h-gear-pants').textContent=getProp(outfit,'内裤','空置');document.getElementById('h-gear-shoes').textContent=getProp(outfit,'鞋子','空置');document.getElementById('h-gear-acc').textContent=getProp(outfit,'饰品','空置');var inv=getProp(sd,'主角.背包',[]);var invHtml='';if(Array.isArray(inv)&&inv.length>0){inv.forEach(function(item){invHtml+='<div class="kv-row"><span>'+escapeHtml(item)+'</span></div>'})}else{invHtml='<div class="nodata">空</div>'}document.getElementById('hero-inventory').innerHTML=invHtml;var task=getProp(sd,'任务',{});document.getElementById('t-main').textContent=task.当前任务||'无';document.getElementById('t-objective').textContent=task.任务目标||'无';document.getElementById('t-sub').textContent=task.子任务||'无';document.getElementById('t-clues').textContent=task.已获取线索||'无';document.getElementById('t-status').textContent=task.任务状态||'-';renderNPCs(sd)}catch(e){console.error('renderAll error:',e);renderNPCs(null)}}
document.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});btn.classList.add('active');document.getElementById('tab-'+btn.dataset.tab).classList.add('active')})});
renderAll();
if(typeof eventOn==='function'&&typeof Mvu!=='undefined'){try{eventOn(Mvu.events.VARIABLE_UPDATE_ENDED,function(){setTimeout(renderAll,200)})}catch(e){}}
</script>
</body>
</html>
