<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新渊暗都 · 状态面板</title>
<style>
:root{--bg:#080b14;--card:#0f1322;--border:#1e2d50;--text:#c8d6e5;--muted:#5a6988;--gold:#f0c040;--cyan:#00e5ff;--blue:#4fc3f7;--purple:#ab47bc;--green:#66bb6a;--orange:#ffa726;--pink:#ec407a;--red:#ef5350;--neon:#39ff14}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:12px;font-size:13px;background-image:radial-gradient(ellipse at top,rgba(79,195,247,.04) 0%,transparent 50%),radial-gradient(ellipse at bottom right,rgba(171,71,188,.03) 0%,transparent 40%)}
.container{width:680px}

/* Header */
.header{text-align:center;margin-bottom:10px}
.header h1{font-size:16px;font-weight:800;color:var(--cyan);letter-spacing:2px;text-shadow:0 0 12px rgba(0,229,255,.2)}

/* Tabs */
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;overflow:hidden}
.tab-btn{flex:1;padding:10px 4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;border-bottom:2px solid transparent;letter-spacing:.5px}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.02)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,229,255,.06)}

/* Tab panels */
.tab-panel{display:none;padding:12px;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;animation:fadeIn .2s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Cards */
.card{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.card h3{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%}

/* Rows */
.row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.row:last-child{border-bottom:none}
.row .lbl{color:var(--muted);font-size:11px}
.row .val{color:var(--text);font-weight:500}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.grid-item{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:6px;padding:8px 6px;text-align:center}
.grid-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.grid-val{font-size:14px;font-weight:700}

/* Bars */
.bar{margin:5px 0}
.bar-info{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.bar-track{height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* NPC */
.nodata{text-align:center;padding:16px;color:var(--muted);font-size:12px}
.npc-card{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:all .2s}
.npc-card:hover{border-color:var(--cyan)}
.npc-head{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--text)}
.npc-badge{font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:4px;margin-left:6px}
.npc-body{display:none;padding:0 12px 12px;font-size:11px}
.npc-body.open{display:block}
.text-block{background:rgba(0,0,0,.15);border-radius:5px;padding:8px;margin:4px 0;font-size:11px;line-height:1.5;white-space:pre-wrap}

/* Gear grid */
.gear-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.gear-item{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:4px;padding:6px;text-align:center}
.gear-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.gear-val{font-size:10px;color:var(--text);margin-top:2px}
</style>
</head>
