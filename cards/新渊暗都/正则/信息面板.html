<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新渊暗都 · 状态面板</title>
<style>
:root{--bg:#0f1119;--card:#161b2a;--border:#1e2d50;--text:#c8d6e5;--muted:#6a7d99;--gold:#f0c040;--blue:#4fc3f7;--purple:#ab47bc;--green:#66bb6a;--orange:#ffa726;--pink:#ec407a;--danger:#ef5350}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a0b14;color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:12px;font-size:14px}
.container{max-width:720px;width:100%}
.header{text-align:center;margin-bottom:12px}
.header h1{font-size:18px;color:var(--blue);margin-bottom:4px}
.header p{font-size:11px;color:var(--muted)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;overflow:hidden}
.tab-btn{flex:1;padding:10px 6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(79,195,247,.08)}
.tab-panel{display:none;padding:10px;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:480px;overflow-y:auto}
.tab-panel.active{display:block}
.card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
.card h3{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:4px;color:var(--text)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%}
.row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.row:last-child{border-bottom:none}
.row span:first-child{color:var(--muted)}
.row span:last-child{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.grid-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;padding:6px}
.grid-label{font-size:10px;color:var(--muted)}
.grid-val{font-size:12px;color:var(--text)}
.bar{margin:4px 0}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.bar-track{height:4px;background:rgba(255,255,255,.05);border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.nodata{text-align:center;padding:12px;color:var(--muted);font-size:12px}
.npc-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden}
.npc-head{padding:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.npc-body{display:none;padding:6px 8px 8px}
.npc-body.open{display:block}
.text-block{background:rgba(0,0,0,.15);border-radius:4px;padding:6px;margin:4px 0;font-size:11px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>新渊暗都</h1><p>霓虹与阴影交织</p></div>
<div class="tabs">
<button class="tab-btn active" data-tab="world">世界</button>
<button class="tab-btn" data-tab="hero">主角</button>
<button class="tab-btn" data-tab="task">任务</button>
<button class="tab-btn" data-tab="npc">社交</button>
</div>
<div class="tab-panel active" id="world">
<div class="card">
<h3><span class="dot" style="background:var(--blue)"></span>时空</h3>
<div class="row"><span>时间</span><span id="w-time">-</span></div>
<div class="row"><span>地点</span><span id="w-loc">-</span></div>
<div class="row"><span>天数</span><span id="w-days">-</span></div>
<div class="row"><span>天气</span><span id="w-weather">-</span></div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--gold)"></span>动态</h3>
<div class="row"><span>活跃度</span><span id="w-act">-</span></div>
<div class="text-block" style="margin-top:4px"><span style="color:var(--muted);font-size:10px">都市流言</span><br><span id="w-rumor">-</span></div>
</div>
</div>
<div class="tab-panel" id="hero">
<div class="card">
<h3><span class="dot" style="background:var(--gold)"></span>身份</h3>
<div class="row"><span>姓名</span><span id="h-name">-</span></div>
<div class="row"><span>势力</span><span id="h-faction">-</span></div>
<div class="row"><span>职业</span><span id="h-job">-</span></div>
<div class="row"><span>种族</span><span id="h-race">-</span></div>
<div class="row"><span>性别</span><span id="h-gender">-</span></div>
<div class="row"><span>年龄</span><span id="h-age">-</span></div>
<div class="row"><span>金钱</span><span id="h-money" style="color:var(--gold)">-</span></div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--purple)"></span>外貌</h3>
<div class="text-block"><span id="h-look">-</span></div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--blue)"></span>属性</h3>
<div class="grid">
<div class="grid-item"><span class="grid-label">灵能等级</span><span class="grid-val" style="color:var(--purple)" id="h-psion">0</span></div>
<div class="grid-item"><span class="grid-label">基因强化</span><span class="grid-val" style="color:var(--green)" id="h-gene">0</span></div>
<div class="grid-item"><span class="grid-label">义体化程度</span><span class="grid-val" style="color:var(--orange)" id="h-cyber">0</span></div>
<div class="grid-item"><span class="grid-label">特殊能力</span><span class="grid-val" style="font-size:10px;color:var(--gold)" id="h-special">-</span></div>
</div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--danger)"></span>生存状态</h3>
<div class="bar"><div class="bar-label"><span>HP</span><span id="h-hp">100/100</span></div><div class="bar-track"><div class="bar-fill" id="h-hp-bar" style="width:100%;background:var(--danger)"></div></div></div>
<div class="bar"><div class="bar-label"><span>体力</span><span id="h-stam">100/100</span></div><div class="bar-track"><div class="bar-fill" id="h-stam-bar" style="width:100%;background:var(--green)"></div></div></div>
<div class="bar"><div class="bar-label"><span>精神力</span><span id="h-mental">100/100</span></div><div class="bar-track"><div class="bar-fill" id="h-mental-bar" style="width:100%;background:var(--blue)"></div></div></div>
<div class="bar"><div class="bar-label"><span>侵蚀度</span><span id="h-eros">0/100</span></div><div class="bar-track"><div class="bar-fill" id="h-eros-bar" style="width:0%;background:var(--purple)"></div></div></div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--green)"></span>着装</h3>
<div class="grid">
<div class="grid-item"><span class="grid-label">外套</span><span class="grid-val" style="font-size:11px" id="g-coat">空置</span></div>
<div class="grid-item"><span class="grid-label">上衣</span><span class="grid-val" style="font-size:11px" id="g-top">空置</span></div>
<div class="grid-item"><span class="grid-label">下装</span><span class="grid-val" style="font-size:11px" id="g-bottom">空置</span></div>
<div class="grid-item"><span class="grid-label">内衣</span><span class="grid-val" style="font-size:11px" id="g-under">空置</span></div>
<div class="grid-item"><span class="grid-label">内裤</span><span class="grid-val" style="font-size:11px" id="g-pants">空置</span></div>
<div class="grid-item"><span class="grid-label">鞋子</span><span class="grid-val" style="font-size:11px" id="g-shoe">空置</span></div>
<div class="grid-item"><span class="grid-label">饰品</span><span class="grid-val" style="font-size:11px" id="g-acc">空置</span></div>
</div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--gold)"></span>背包</h3>
<div id="inv"></div>
</div>
</div>
<div class="tab-panel" id="task">
<div class="card">
<h3><span class="dot" style="background:var(--orange)"></span>任务</h3>
<div class="row"><span>当前任务</span><span id="t-main">-</span></div>
<div class="row"><span>任务目标</span><span id="t-goal">-</span></div>
<div class="row"><span>子任务</span><span id="t-sub">-</span></div>
<div class="row"><span>任务状态</span><span id="t-status">-</span></div>
</div>
<div class="card">
<h3><span class="dot" style="background:var(--pink)"></span>线索</h3>
<div class="text-block" style="white-space:pre-wrap"><span id="t-clues">-</span></div>
</div>
</div>
<div class="tab-panel" id="npc">
<div id="npc-list"></div>
</div>
</div>
<script>
function g(o,p,d){var k=p.split('.'),r=o;for(var i=0;i<k.length;i++){if(r&&typeof r==='object'&&k[i]in r)r=r[k[i]];else return d}return r!==undefined?r:d}
function esc(s){if(!s)return '';var r='';for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);r+=c===38?'&amp;':c===60?'&lt;':c===62?'&gt;':c===34?'&quot;':c===39?'&#39;':s[i]}return r}
function render(){var d=null;if(typeof getAllVariables==='function'){var a=getAllVariables();var p=typeof _!=='undefined'?_.get(a,'stat_data'):(a.stat_data||a);if(p&&Object.keys(p).length>0)d=p}if(!d){document.getElementById('npc-list').innerHTML='<div class="nodata">无数据</div>';return}
document.getElementById('w-time').textContent=g(d,'世界.当前时间','-');
document.getElementById('w-loc').textContent=g(d,'世界.当前地点','-');
document.getElementById('w-days').textContent='第'+(g(d,'世界.经过天数',0)||0)+'天';
document.getElementById('w-weather').textContent=g(d,'世界.天气','-');
document.getElementById('w-act').textContent=g(d,'世界.城市活跃度','-');
document.getElementById('w-rumor').textContent=g(d,'世界.都市流言','-')||'-';
var b=g(d,'主角.基础',{});document.getElementById('h-name').textContent=b.姓名||'-';
document.getElementById('h-faction').textContent=b.势力||'-';
document.getElementById('h-job').textContent=b.职业||'-';
document.getElementById('h-race').textContent=b.种族||'-';
document.getElementById('h-gender').textContent=b.性别||'-';
document.getElementById('h-age').textContent=(b.年龄||'-')+'岁';
document.getElementById('h-money').textContent=(b.金钱||0)+' 夜光币';
document.getElementById('h-look').textContent=b.外貌身材||'待生成';
var at=g(d,'主角.属性',{});document.getElementById('h-psion').textContent=at.灵能等级||0;
document.getElementById('h-gene').textContent=at.基因强化等级||0;
document.getElementById('h-cyber').textContent=at.义体化程度||0;
document.getElementById('h-special').textContent=at.特殊能力||'无';
var st=g(d,'主角.状态',{});var hp=st.HP||100,stam=st.体力||100,men=st.精神力||100,ero=st.侵蚀度||0;
document.getElementById('h-hp').textContent=hp+'/100';document.getElementById('h-hp-bar').style.width=hp+'%';
document.getElementById('h-stam').textContent=stam+'/100';document.getElementById('h-stam-bar').style.width=stam+'%';
document.getElementById('h-mental').textContent=men+'/100';document.getElementById('h-mental-bar').style.width=men+'%';
document.getElementById('h-eros').textContent=ero+'/100';document.getElementById('h-eros-bar').style.width=ero+'%';
var o=g(d,'主角.着装',{});document.getElementById('g-coat').textContent=g(o,'外套','空置');
document.getElementById('g-top').textContent=g(o,'上衣','空置');document.getElementById('g-bottom').textContent=g(o,'下装','空置');
document.getElementById('g-under').textContent=g(o,'内衣','空置');document.getElementById('g-pants').textContent=g(o,'内裤','空置');
document.getElementById('g-shoe').textContent=g(o,'鞋子','空置');document.getElementById('g-acc').textContent=g(o,'饰品','空置');
var inv=g(d,'主角.背包',[]);var ih='';if(Array.isArray(inv)&&inv.length){for(var ii=0;ii<inv.length;ii++){ih+='<div class="row"><span>'+esc(inv[ii])+'</span></div>'}}else{ih='<div class="nodata">背包为空</div>'}
document.getElementById('inv').innerHTML=ih;
var t=g(d,'任务',{});document.getElementById('t-main').textContent=t.当前任务||'无';
document.getElementById('t-goal').textContent=t.任务目标||'无';
document.getElementById('t-sub').textContent=t.子任务||'无';
document.getElementById('t-status').textContent=t.任务状态||'-';
document.getElementById('t-clues').textContent=t.已获取线索||'无';
var nL=g(d,'社交.已遇NPC列表',[]);var nR=g(d,'社交.NPC关系',{});var nh='';
if(!nL.length)nh='<div class="nodata">尚未遇到NPC</div>';
else{for(var ni=0;ni<nL.length;ni++){var n=nL[ni],r=nR[n]||{};var aff=r.好感度||0;
nh+='<div class="npc-card"><div class="npc-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">'+esc(n)+'<span style="color:var(--pink)">好感'+aff+'</span></div><div class="npc-body"><div class="row"><span>职业</span><span>'+esc(r.职业||'-')+'</span></div><div class="row"><span>种族</span><span>'+esc(r.种族||'-')+'</span></div><div class="text-block" style="margin-top:4px"><span style="color:var(--muted);font-size:10px">外貌身材</span><br><span>'+esc(r.外貌身材||'待生成')+'</span></div><div class="text-block"><span style="color:var(--muted);font-size:10px">对玩家看法</span><br><span style="color:var(--gold)">'+esc(r.看法||'陌生')+'</span></div><div class="bar" style="margin-top:6px"><div class="bar-label"><span>好感度</span><span style="color:var(--pink)">'+aff+'/100</span></div><div class="bar-track"><div class="bar-fill" style="width:'+aff+'%;background:var(--pink)"></div></div></div></div></div>'}}
document.getElementById('npc-list').innerHTML=nh}
document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active')});document.querySelectorAll('.tab-panel').forEach(function(x){x.classList.remove('active')});b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')})});
render();
if(typeof eventOn==='function'&&typeof Mvu!=='undefined'){try{eventOn(Mvu.events.VARIABLE_UPDATE_ENDED,function(){setTimeout(render,150)})}catch(e){}}
</script>
</body>
</html>
